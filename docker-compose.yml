services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  mailpit:
    image: axllent/mailpit
    ports: ["1025:1025", "8025:8025"]

  laravel:
    build: { context: ./backend, target: dev }
    command: php artisan serve --host=0.0.0.0 --port=8020
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_HOST: ${DB_HOST}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
    volumes: ["./backend:/app"]
    ports: ["8020:8020"]
    depends_on: [postgres, mailpit]

  queue:
    build: { context: ./backend, target: dev }
    command: php artisan queue:work --sleep=3 --tries=3
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      DB_HOST: ${DB_HOST}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
    volumes: ["./backend:/app"]
    depends_on: [postgres, laravel]

  frontend:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && rm -rf .nuxt && npm run dev"
    environment:
      NUXT_HOST: 0.0.0.0
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
      NUXT_PUBLIC_APP_NAME: ${NUXT_PUBLIC_APP_NAME}
    volumes: ["./frontend:/app"]
    ports: ["3000:3000"]
    depends_on: [laravel]

volumes:
  pgdata: {}
