services:
  postgres:
    image: postgres:16-alpine
    env_file: ./backend/.env
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  mailpit:
    image: axllent/mailpit
    ports: ["1025:1025", "8025:8025"]

  laravel:
    build: { context: ./backend, target: dev }
    command: php artisan serve --host=0.0.0.0 --port=8020
    env_file: ./backend/.env
    volumes: ["./backend:/app"]
    ports: ["8020:8020"]
    depends_on: [postgres, mailpit]

  queue:
    build: { context: ./backend, target: dev }
    command: php artisan queue:work --sleep=3 --tries=3
    env_file: ./backend/.env
    volumes: ["./backend:/app"]
    depends_on: [postgres, laravel]

  frontend:
    image: node:22
    working_dir: /app
    command: sh -c "npm install && rm -rf .nuxt && npm run dev"
    environment:
      NUXT_HOST: 0.0.0.0
    env_file: ./frontend/.env
    volumes: ["./frontend:/app"]
    ports: ["3000:3000"]
    depends_on: [laravel]

volumes:
  pgdata: {}
