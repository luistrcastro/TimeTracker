<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Tracker</title>
  <script>
    (function() {
      const saved = localStorage.getItem('timetracker_theme');
      const dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    })();
  </script>
  <link rel="stylesheet" href="common.css">
  <style>
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; background:var(--bg); font-family:var(--sans); }
    .launcher-title { font-size:1.4rem; font-weight:600; color:var(--text); margin-bottom:6px; letter-spacing:0.02em; }
    .launcher-sub { font-size:0.8rem; color:var(--text-muted); margin-bottom:44px; font-family:var(--mono); }
    .launcher-btns { display:flex; gap:18px; }
    .launcher-btn { display:block; padding:18px 44px; border-radius:10px; background:var(--surface); border:1.5px solid var(--border); color:var(--text); font-size:1.05rem; font-weight:500; text-decoration:none; transition:border-color 0.15s, box-shadow 0.15s; font-family:var(--sans); cursor:pointer; }
    .launcher-btn:hover { border-color:var(--accent-interactive,#5b6af5); box-shadow:0 2px 12px rgba(0,0,0,0.08); }
    .launcher-ver { margin-top:44px; font-size:0.7rem; color:var(--text-faint); font-family:var(--mono); }
  </style>
</head>
<body>
  <div class="launcher-title">Time Tracker</div>
  <div class="launcher-sub">Choose your workflow</div>
  <div class="launcher-btns">
    <a href="replicon.html" class="launcher-btn">Replicon</a>
    <a href="contractor.html" class="launcher-btn">Contractor</a>
  </div>
  <div class="launcher-ver">v2.0.0</div>
</body>
</html>
