services:
  postgres:
    image: postgres:16-alpine
    environment: { POSTGRES_DB: timetracker, POSTGRES_USER: tt, POSTGRES_PASSWORD: tt }
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  mailpit:
    image: axllent/mailpit
    ports: ["1025:1025", "8025:8025"]
  laravel:
    build: { context: ../../backend, target: dev }
    command: php artisan serve --host=0.0.0.0 --port=8000
    environment:
      DB_HOST: postgres
      DB_DATABASE: timetracker
      DB_USERNAME: tt
      DB_PASSWORD: tt
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
    volumes: ["../../backend:/app"]
    ports: ["8000:8000"]
    depends_on: [postgres, mailpit]
volumes:
  pgdata: {}
